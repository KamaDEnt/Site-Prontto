kind = "web"
previewPath = "/"
title = "Prontto"
version = "1.0.0"
id = "artifacts/prontto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24421

[services.development]
run = "pnpm --filter @workspace/prontto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prontto", "run", "build" ]
publicDir = "artifacts/prontto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24421"
BASE_PATH = "/"
